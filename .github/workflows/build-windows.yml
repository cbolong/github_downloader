name: Build Windows EXE

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Run tests
        run: python tests/test_logic.py

      - name: Build EXE
        run: pyinstaller --noconfirm --onefile --windowed --name GitHubReleaseDownloader app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitHubReleaseDownloader
          path: dist/GitHubReleaseDownloader.exe

      - name: Attach EXE to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GitHubReleaseDownloader.exe
