name: Build Windows EXE

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Run tests
        run: python tests/test_logic.py

      - name: Build EXE
        run: pyinstaller --noconfirm --onefile --windowed --name GitHubReleaseDownloader app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitHubReleaseDownloader
          path: dist/GitHubReleaseDownloader.exe

      - name: Check if VERSION file changed
        id: ver
        shell: pwsh
        run: |
          $changedFiles = git diff-tree --no-commit-id -r --name-only HEAD
          $isTag = "${{ github.ref }}" -like "refs/tags/v*"
          if (($changedFiles -contains "VERSION") -or $isTag) {
            $tag = if ($isTag) { "${{ github.ref_name }}" } else { (Get-Content VERSION -Raw).Trim() }
            "release=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "tag=$tag"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "release=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Create / update release
        if: steps.ver.outputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          files: dist/GitHubReleaseDownloader.exe

      - name: Keep only 3 latest releases
        if: steps.ver.outputs.release == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.paginate(
              github.rest.repos.listReleases,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
            );
            const sorted = releases.sort(
              (a, b) => new Date(b.created_at) - new Date(a.created_at)
            );
            for (const rel of sorted.slice(3)) {
              console.log(`Deleting old release: ${rel.tag_name}`);
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: rel.id,
              });
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${rel.tag_name}`,
              });
            }
